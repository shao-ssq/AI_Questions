  name: 孙绍齐
  headline: AI Agent工程师 | 软件工程硕士 | 男
  email: shaoqisun@qq.com
  phone: "+86 17724838277"
  website: https://shao12138.blog.csdn.net/
  custom_connections:
  sections:
    教育背景:
      - institution: 国防科技大学（985，保送）
        area: 软件工程
        degree: 硕士
        start_date: 2021-09
        end_date: 2024-06
        location: 湖南-长沙
        summary:
        highlights:
          - 方向：分布式计算、多智能体强化学习
          - 论文：基于策略差异化的多智能体内在奖励研究（IEEE Trans*2、CCF-B）
          - 科室：并行与分布处理国家重点实验室；导师：丁博
      - institution: 郑州大学（211）
        area: 软件工程
        degree: 学士
        start_date: 2017-09
        end_date: 2021-06
        location: 河南-郑州
        summary:
        highlights:
          - 方向：Java后端开发、自然语言处理
          - 论文：基于交互式多任务学习的中文文本情感分类（SCI）
          - 绩点：3.63/4.00；排名：12/712；英语：CET-6
    工作经验:
      - company: 微众银行（武汉研发中心）
        position: 后端开发工程师
        date:
        start_date: 2024-09
        end_date: present
        location: 湖北-武汉
        summary:
        highlights:
          - 主导 ChatBI + Analysis Agent 本体论项目，RAG 命中率 98%，问数准确率 87%。
          - 独立完成 CV3（TTS）推理优化，双流式 24 并发在 429ms（P99），业界领先。
          - CSDN 博客访问量：210w；LeetCode 刷题量：710+
    项目经历:
      - name: ChatBI 智能数据洞察平台
        date:
        start_date: 2025-03
        end_date: present
        location:
        summary: 基于 Multi-Agent 的自然语言数据分析平台，支持自然语言转 SQL、智能问数与数据洞察
        highlights:
          - 架构：设计主从式 Multi-Agent 架构，主控 Agent 调度 6 个副 Agent（数据分析、可视化、代码生成、报告撰写、质量保证、假设生成）。
          - 检索：Schema Linking + Text-to-SQL 两阶段架构，BM25 + HNSW 混合检索实现 98% 表命中率。
          - 训练：QLoRA 微调 + GSPO 强化训练 DeepSeek 模型，提升复杂推理能力。
          - 推理：融合 ReAct 推理框架，问数准确率达 87%。
          - 部署：vLLM 推理加速 + KV Cache 优化，单卡 QPS 提升 3 倍，P99 延迟控制在 500ms 内。
      - name: CV3 推理延迟优化与分布式部署
        date:
        start_date: 2024-10
        end_date: 2025-03
        location:
        summary:
        highlights:
          - 内容：分离式架构防止 LLM 和 token2wav 资源竞争；vLLM & 多 estimator 加速 LLM 推理速度；配套流式输入&输出，提升全流程速度。
          - 成果：4 卡分布式部署下，双流式 24 并发 P99 稳定在 429ms 内；消除流式输入延迟的条件下，TTS 推理 P99 低至 264ms，业界领先。
    论文发表:
      - title: 领导者与协作性：应对多智能体强化学习中的稀疏奖励挑战
        authors:
          - '*Shaoqi Sun*'
          - Hui Liu
          - Kele Xu
        summary:
        doi: 10.1109/TETCI.2024.3488772
        url: https://ieeexplore.ieee.org/abstract/document/10750496
        journal: IEEE Transactions on Artificial Intelligence
        date: 2024-11
      - title: 面向多智能体强化学习的双向影响与交互
        authors:
          - '*Shaoqi Sun*'
          - Kele Xu
          - Dawei Feng
        summary:
        doi: 10.1109/TAI.2024.3401649
        url: https://ieeexplore.ieee.org/document/10531155#citations
        journal: IEEE Transactions on Artificial Intelligence
        date: 2024-05
      - title: 基于时间不一致性的内在奖励在多智能体强化学习中的应用
        authors:
          - '*Shaoqi Sun*'
          - Kele Xu
        summary:
        doi: 10.1109/IJCNN54540.2023.10191420
        url: https://ieeexplore.ieee.org/document/10191420
        journal: IJCNN CCF-C
        date: 2023-08
      - title: 渐进式多样化策略在多智能体强化学习中的应用
        authors:
          - '*Shaoqi Sun*'
          - Yuanzhao Zhai
          - Kele Xu
        summary:
        doi: 10.1109/ICASSP49357.2023.10096125
        url: https://ieeexplore.ieee.org/document/10096125/
        journal: ICASSP CCF-B
        date: 2023-05
      - title: 基于交互式多任务学习的中文文本情感分类
        authors:
          - Han Zhang（导师）
          - '*Shaoqi Sun*'
          - Yongjin Hu
        summary:
        doi: 10.1109/ACCESS.2020.3007889
        url: https://ieeexplore.ieee.org/document/9136689
        journal: IEEE Access SCI
        date: 2020-07
    荣誉奖项:
      - bullet: 省、校、院优秀毕业生、郑州大学一等奖学金 & 三好学生（连续四届）
      - bullet: 国防科技大学全额学业奖学金（连续三届）、2023 优秀一等奖学金 & 优秀学员、2021 新生奖学金
      - bullet: 2023 挑战杯学术科技作品竞赛（国二）、2020 全国大学生信息安全竞赛（国三）
      - bullet: 2022 大疆创新机甲大师高校 Sim2Real 挑战赛（国三）
    技术栈:
      - label: 【ML & DL & RL】
        details: PLA、SVM、聚类、FNN、CNN、RNN、激活函数、优化器、DQN系列、AC系列、DDPG。
      - label: 【Transformer】
        details: 位置编码、ROPE、QKV、KV Cache、Attention、残差 & 归一化、MHA系列、Flash Attention。
      - label: 【SFT & RLHF】
        details: P-tuning、LoRA、QLoRA、蒸馏、PPO、GRPO、DRPO、GSPO、DPO、DAPO、VAPO。
      - label: 【vLLM & DeepSpeed】
        details: 显存估算、KV Cache、内存墙、PD分离、PagedAttention、并行策略、ZeRO(1-3)。
      - label: 【RAG】
        details: 混合检索、重排序、语义切分、Graph RAG、IF-IDF & BM25、IVF & HNSW、评估。
      - label: 【Agent】
        details: Qwen & DeepSeek、ReAct、MCP、COT、Skill、反思、多轮对话优化、长上下文处理。
      - label: 【Java】
        details: 封装、继承、多态、多线程、阻塞队列、线程池、集合类、反射。
      - label: 【JVM】
        details: 内存模型、类加载、双亲委派、内存溢出、垃圾回收机制、JDK21、Arthas。
      - label: 【Spring】
        details: IOC、AOP、Bean生命周期、循环依赖、事务传播机制；Spring MVC 拦截器&过滤器。
      - label: 【分布式】
        details: 服务注册发现、CAP、阶段提交、负载均衡、限流熔断、共识算法、认证授权、Docker。
      - label: 【消息队列】
        details: 消费幂等性、可靠传输、顺序消费；解决消息挤压、耦合、削峰、分布式事务等问题。
      - label: 【缓存】
        details: 原理、数据结构、集群方式、内存碎片，RDB&AOF，分布式锁；缓存穿透（雪崩、击穿、污染）。
      - label: 【数据库】
        details: 数据库范式、事务处理、锁、SQL优化、InnoDB 引擎、MVCC 原理、索引机制。
      - label: 【数据结构】
        details: KMP、红黑树、堆、二叉树构造&遍历、BFS&DFS、最小生成树、最短路径、排序算法。
      - label: 【操作系统】
        details: 进程&线程、通信方式、用户态&核心态、内存管理、虚拟内存、Cache 替换算法。
      - label: 【计算机网络】
        details: TCP&UDP、TCP 流量控制、TCP 拥塞控制、三次握手&四次挥手、HTTP&HTTPS、DNS。

